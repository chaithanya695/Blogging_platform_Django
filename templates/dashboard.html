{% extends 'base.html' %}

{% block content %}

<h1 class="fw-bold mb-4">
    Dashboard
</h1>

<div class="row">

    <div class="col-md-4">
        <div class="card text-center shadow-sm mb-3">
            <div class="card-body">
                <h2>{{ total_posts }}</h2>
                <p>Total Posts</p>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center shadow-sm mb-3">
            <div class="card-body">
                <h2>{{ total_likes }}</h2>
                <p>Total Likes</p>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center shadow-sm mb-3">
            <div class="card-body">
                <h2>{{ total_comments }}</h2>
                <p>Total Comments</p>
            </div>
        </div>
    </div>

</div>

<h3 class="mt-4">
    Recent Posts
</h3>

{% for post in recent_posts %}

<div class="card mb-2">

    <div class="card-body">

        <a href="{% url 'blog:post_detail' post.id %}">
            {{ post.title }}
        </a>

    </div>

</div>

{% empty %}

<p>No posts yet.</p>

{% endfor %}

{% endblock %}
