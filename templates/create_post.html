{% extends 'base.html' %}

{% load static %}

{% block content %}

<link rel="stylesheet"
      href="{% static 'css/form.css' %}">

<div class="form-card">

    <h2 class="form-heading">
        Create New Blog Post
    </h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="btn btn-success">
            Publish Post
        </button>

        <a href="/"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
