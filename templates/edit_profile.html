{% extends 'base.html' %}

{% block content %}

<div class="container" style="max-width:700px;">

    <h2 class="mb-4">
        Edit Profile
    </h2>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary">
            Save Changes
        </button>

    </form>

</div>

{% endblock %}
