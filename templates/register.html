{% extends 'base.html' %}

{% load static %}

{% block content %}

<link rel="stylesheet"
      href="{% static 'css/auth.css' %}">

<div class="auth-card" style="background-color: rgba(245, 245, 220, 0.71);">

    <h2 class="auth-heading">
        Create Account
    </h2>

    <form method="POST" autocomplete="off">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="btn btn-success w-100">
            Register
        </button>

    </form>

</div>

{% endblock %}
