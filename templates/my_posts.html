{% extends 'base.html' %}

{% block content %}

<h1 class="fw-bold mb-4">
    My Posts
</h1>

{% for post in posts %}

<div class="card shadow-sm mb-3">

    <div class="card-body">

        <h4>{{ post.title }}</h4>

        <p>
            {{ post.content|truncatewords:20 }}
        </p>

        <a href="{% url 'blog:post_detail' post.id %}" class="btn btn-primary btn-sm">
            View
        </a>

        <a href="{% url 'blog:edit_post' post.id %}" class="btn btn-warning btn-sm">
            Edit
        </a>

    </div>

</div>

{% empty %}

<p class="text-muted">
    You haven't created any posts yet.
</p>

{% endfor %}

{% endblock %}
